<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Tab Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Smart Tab Manager</h2>

<p id="tabCount">Open Tabs: 0</p>

<input id="searchInput" placeholder="Search tabs">

<div class="buttons">

<button id="showTabs">Show Tabs</button>
<button id="closeDuplicates">Close Duplicate Tabs</button>
<button id="focusMode">Focus Mode</button>

</div>

<h3>Tabs</h3>
<ul id="tabList"></ul>

<h3>Productivity Report</h3>
<div id="report"></div>

<script src="popup.js"></script>

</body>
</html>
